name: Android Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: 0

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'build-tools;29.0.3'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew :ui:assembleRelease --stacktrace

    - name: Get version from gradle.properties
      id: version
      run: |
        VERSION_NAME=$(grep wireguardVersionName gradle.properties | cut -d'=' -f2)
        VERSION_CODE=$(grep wireguardVersionCode gradle.properties | cut -d'=' -f2)
        SHORT_SHA=$(git rev-parse --short=8 HEAD)
        echo "version=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
        echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
        echo "Version: $VERSION_NAME"

    - name: Generate release notes
      id: release_notes
      run: |
        COMMIT_SUBJECT=$(git log -1 --format=%s)
        COMMIT_BODY=$(git log -1 --format=%b)
        {
          echo "## ${COMMIT_SUBJECT}"
          echo
          printf '%s\n' "${COMMIT_BODY}"
        } > RELEASE_NOTES.md
        echo "release_notes_file=RELEASE_NOTES.md" >> $GITHUB_OUTPUT

    - name: Rename APK
      run: |
        APK_DIR="ui/build/outputs/apk/release"
        SRC=""
        if [ -f "$APK_DIR/ui-release.apk" ]; then
          SRC="$APK_DIR/ui-release.apk"
        elif [ -f "$APK_DIR/ui-universal-release.apk" ]; then
          SRC="$APK_DIR/ui-universal-release.apk"
        else
          echo "No expected release APK found in $APK_DIR"
          ls -la "$APK_DIR" || true
          exit 1
        fi
        mv "$SRC" "$APK_DIR/wg-turn-v${{ steps.version.outputs.version }}.apk"

    - name: Sign APK
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: ui/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.SIGNING_KEY }}
        alias: ${{ secrets.ALIAS }}
        keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}

    - name: Prepare OTA assets
      id: ota_assets
      run: |
        APK_DIR="ui/build/outputs/apk/release"
        SIGNED_APK="${{ steps.sign_app.outputs.signedReleaseFile }}"
        OTA_APK="${APK_DIR}/ota-release.apk"
        OTA_JSON="${APK_DIR}/ota-release.json"
        cp "${SIGNED_APK}" "${OTA_APK}"
        SHA256=$(sha256sum "${OTA_APK}" | awk '{print $1}')
        cat > "${OTA_JSON}" <<EOF
        {
          "version_code": ${{ steps.version.outputs.version_code }},
          "version_name": "${{ steps.version.outputs.version }}",
          "apk_url": "https://github.com/${{ github.repository }}/releases/latest/download/ota-release.apk",
          "sha256": "${SHA256}"
        }
        EOF
        echo "ota_apk=${OTA_APK}" >> $GITHUB_OUTPUT
        echo "ota_json=${OTA_JSON}" >> $GITHUB_OUTPUT

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ${{ steps.sign_app.outputs.signedReleaseFile }}
          ${{ steps.ota_assets.outputs.ota_apk }}
          ${{ steps.ota_assets.outputs.ota_json }}
        draft: false
        prerelease: false
        name: v${{ steps.version.outputs.version }}-${{ steps.version.outputs.short_sha }}
        body_path: ${{ steps.release_notes.outputs.release_notes_file }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
